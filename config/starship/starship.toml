# Starship prompt configuration
# https://starship.rs/config/

# Timeout for commands executed by starship (ms)
command_timeout = 1000
palette = "catppuccin_mocha"

# Prompt layout:
#   LINE 1: full directory path
#   LINE 2: git + user@host (ssh only) + language versions + battery (when low)
#   LINE 3: exit code (on failure) + prompt character
# When NOT in a git repo, line 2 collapses away (the break is anchored to git_branch).
format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$username\
$hostname\
$package\
$c$cmake$cobol$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$gleam$golang$guix_shell$haskell$haxe$helm$java$julia$kotlin$gradle$lua$nim$nodejs$ocaml$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$zig$buf$conda$meson$spack\
$direnv\
$aws$gcloud$openstack$azure\
$battery\
$env_var\
$custom\
$sudo\
$line_break\
$status\
$character"""

# Right-side prompt: command duration + time
right_format = '$cmd_duration$time'

[cmd_duration]
min_time = 2_000
format = '[took $duration]($style) '

[time]
disabled = false
format = '[$time]($style)'
time_format = '%H:%M:%S'

[character]
success_symbol = "[ÔŁ»](bold green)"
error_symbol = "[ÔŁ»](bold red)"

[directory]
truncation_length = 0
truncate_to_repo = false

# Leading newline breaks to line 2 ONLY when in a repo (branch is present),
# so non-repo directories stay a tidy 2 lines with no blank gap.
[git_branch]
format = "\n[$symbol$branch(:$remote_branch)]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
ahead = 'Ôçí${count}'
behind = 'Ôçú${count}'
diverged = 'ÔçĽÔçí${ahead_count}Ôçú${behind_count}'

[git_metrics]
disabled = false

# Show the exit code (and signal names) when the last command failed
[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = 'Ôťś '
style = 'bold red'
map_symbol = true

# user@host ÔÇö only when SSH'd into a remote machine (hidden locally)
[hostname]
ssh_only = true
format = '[$ssh_symbol$hostname]($style) '
style = 'bold yellow'

[username]
show_always = false
format = '[$user]($style)@'
style_user = 'bold yellow'
style_root = 'bold red'

# Battery indicator ÔÇö shown only when charge drops below 20%
[battery]
full_symbol = '­čöő '
charging_symbol = 'ÔÜí '
discharging_symbol = '­č¬ź '

[[battery.display]]
threshold = 20
style = 'bold red'

[elixir]
symbol = "­čĺž "

[erlang]
symbol = " "

[nodejs]
symbol = " "

[package]
disabled = true

[docker_context]
disabled = true


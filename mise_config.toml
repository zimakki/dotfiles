# Global mise runtimes — single source of truth for language versions.
# Prefer mise over Homebrew for runtimes to avoid PATH/version conflicts.
# Symlinked to ~/.config/mise/config.toml by setup_sim_links.zsh.
#
# Note: the elixir build is precompiled against a specific OTP major
# (the -otp-NN suffix), so the erlang major must match it.
[tools]
node = "22.13"   # copilot.nvim requires node >= 22.13
python = "3.13"
elixir = "1.20.1-otp-29"
erlang = "29.0.2"

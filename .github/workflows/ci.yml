name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Scan tracked files for secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$archive"
          echo "${GITLEAKS_LINUX_X64_SHA256}  ${archive}" | sha256sum --check
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks

      - name: Scan the current tracked tree
        run: |
          tracked_tree="$RUNNER_TEMP/tracked-tree"
          mkdir -p "$tracked_tree"
          git archive HEAD | tar -x -C "$tracked_tree"
          "$RUNNER_TEMP/gitleaks" dir "$tracked_tree" \
            --config "$GITHUB_WORKSPACE/.gitleaks.toml" \
            --redact=100 \
            --no-banner

  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install --yes shellcheck zsh

      - name: Install compatible mise for isolated bootstrap tests
        env:
          MISE_VERSION: 2026.7.5
        run: |
          curl --fail --silent --show-error --location \
            "https://github.com/jdx/mise/releases/download/v${MISE_VERSION}/mise-v${MISE_VERSION}-linux-x64" \
            --output "$RUNNER_TEMP/mise"
          chmod +x "$RUNNER_TEMP/mise"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Run checks
        run: scripts/ci_checks.sh

# Discoverable workstation bootstrap config. This same file is linked to
# ~/.config/mise/config.toml so the tools remain global outside this checkout.
min_version = "2026.7.4"

[env]
# kerl reads this while Erlang is compiled, before managed shell files exist.
KERL_BUILD_DOCS = "yes"

[tools]
bun = "1.3.14"
elixir = "1.20.2-otp-29"
erlang = "29.0.2"
fnox = "1.29.0"
node = "24.13.1"
"npm:portless" = "0.15.1"
python = "3.13.14"

[settings]
dotfiles.default_mode = "symlink"

# This is step zero of a full bootstrap. Refuse an ephemeral worktree before
# any package, dotfile, default, tool, or exception task can mutate the machine.
[bootstrap.hooks.pre-packages]
run = '''
repo="${MISE_CONFIG_ROOT:-}"
if [ ! -x "$repo/scripts/bootstrap/preflight.zsh" ]; then
  config="${MISE_GLOBAL_CONFIG_FILE:-${XDG_CONFIG_HOME:-$HOME/.config}/mise/config.toml}"
  if [ -e "$config" ] || [ -L "$config" ]; then
    repo="$(dirname "$(realpath "$config")")"
  else
    repo="$(git rev-parse --show-toplevel 2>/dev/null || pwd -P)"
  fi
fi
exec "$repo/scripts/bootstrap/preflight.zsh" --guard-only "$repo"
'''

# BrewFile deliberately remains the sole package/cask inventory. Guard again
# so `mise bootstrap --only tools` is safe, then install Erlang build inputs.
[bootstrap.hooks.pre-tools]
run = '''
repo="${MISE_CONFIG_ROOT:-}"
if [ ! -x "$repo/scripts/bootstrap/preflight.zsh" ]; then
  config="${MISE_GLOBAL_CONFIG_FILE:-${XDG_CONFIG_HOME:-$HOME/.config}/mise/config.toml}"
  if [ -e "$config" ] || [ -L "$config" ]; then
    repo="$(dirname "$(realpath "$config")")"
  else
    repo="$(git rev-parse --show-toplevel 2>/dev/null || pwd -P)"
  fi
fi
"$repo/scripts/bootstrap/preflight.zsh" --guard-only "$repo"
brew bundle --file="$repo/BrewFile"
'''

# Dotfile sources are checkout-relative. Refuse a secondary worktree before
# mise can repoint HOME at a disposable path.
[bootstrap.hooks.pre-dotfiles]
run = '''
repo="${MISE_CONFIG_ROOT:-}"
if [ ! -x "$repo/scripts/bootstrap/preflight.zsh" ]; then
  config="${MISE_GLOBAL_CONFIG_FILE:-${XDG_CONFIG_HOME:-$HOME/.config}/mise/config.toml}"
  if [ -e "$config" ] || [ -L "$config" ]; then
    repo="$(dirname "$(realpath "$config")")"
  else
    repo="$(git rev-parse --show-toplevel 2>/dev/null || pwd -P)"
  fi
fi
exec "$repo/scripts/bootstrap/preflight.zsh" --guard-only "$repo"
'''

# Direct `--only macos-defaults` runs skip pre-packages and pre-dotfiles.
[bootstrap.hooks.pre-defaults]
run = '''
repo="${MISE_CONFIG_ROOT:-}"
if [ ! -x "$repo/scripts/bootstrap/preflight.zsh" ]; then
  config="${MISE_GLOBAL_CONFIG_FILE:-${XDG_CONFIG_HOME:-$HOME/.config}/mise/config.toml}"
  if [ -e "$config" ] || [ -L "$config" ]; then
    repo="$(dirname "$(realpath "$config")")"
  else
    repo="$(git rev-parse --show-toplevel 2>/dev/null || pwd -P)"
  fi
fi
exec "$repo/scripts/bootstrap/preflight.zsh" --guard-only "$repo"
'''

[dotfiles]
"~/.zshenv" = "config/zsh/zshenv"
"~/.zprofile" = "config/zsh/zprofile"
"~/.zshrc" = "config/zsh/zshrc"
"~/.gitconfig" = "config/git/config"
"~/Brewfile" = "BrewFile"
"~/.gitignore_global" = "config/git/ignore_global"
"~/.config/starship.toml" = "config/starship/starship.toml"
"~/.config/atuin/config.toml" = "config/atuin/config.toml"
"~/.config/atuin/themes/catppuccin-mocha-mauve.toml" = "config/atuin/themes/catppuccin-mocha-mauve.toml"
"~/.config/mise/config.toml" = "mise.toml"
"~/.config/television" = "config/television"
"~/.config/ghostty/config" = "config/ghostty/config"
"~/.warp/keybindings.yaml" = "config/warp/keybindings.yaml"
"~/.warp/themes/catppuccin_mocha.yml" = "config/warp/themes/catppuccin_mocha.yml"
"~/.config/bat/config" = "config/bat/config"
"~/.config/hunk/config.toml" = "config/hunk/config.toml"
"~/.zsh/catppuccin_mocha-zsh-syntax-highlighting.zsh" = "config/zsh/themes/catppuccin_mocha-zsh-syntax-highlighting.zsh"

[bootstrap.macos.keyboard]
initial_key_repeat = 10
key_repeat = 1
press_and_hold = false
fn_state = true

[bootstrap.macos.finder]
show_all_files = true
show_pathbar = true
preferred_view_style = "list"

[bootstrap.macos.dock]
autohide = true
tilesize = 39
orientation = "right"

[bootstrap.macos.defaults]
NSGlobalDomain = { AppleShowAllExtensions = true }
"com.apple.finder" = { _FXSortFoldersFirst = true }

[tasks.bootstrap]
description = "Apply the small machine-setup exceptions mise cannot express"
dir = "{{cwd}}"
run = '''
repo="${MISE_CONFIG_ROOT:-}"
if [ ! -x "$repo/scripts/bootstrap/exceptions.zsh" ]; then
  config="${MISE_GLOBAL_CONFIG_FILE:-${XDG_CONFIG_HOME:-$HOME/.config}/mise/config.toml}"
  if [ -e "$config" ] || [ -L "$config" ]; then
    repo="$(dirname "$(realpath "$config")")"
  else
    repo="$(git rev-parse --show-toplevel 2>/dev/null || pwd -P)"
  fi
fi
exec "$repo/scripts/bootstrap/exceptions.zsh"
'''
